version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: adf-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_data_fabric}
      POSTGRES_USER: ${POSTGRES_USER:-adf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adf_secret_password_change_me}
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - adf_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adf_user} -d ${POSTGRES_DB:-agent_data_fabric}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: adf-backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-7790}:7790"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./mcp_server:/app/mcp_server
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: adf-mcp-server
    command: python -m mcp_server.server
    env_file: .env
    ports:
      - "${MCP_SERVER_PORT:-7792}:7792"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./mcp_server:/app/mcp_server
      - ./backend:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adf-frontend
    ports:
      - "${FRONTEND_PORT:-7791}:7791"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  adf_pgdata:
